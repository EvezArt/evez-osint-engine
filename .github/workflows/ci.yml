name: EVEZ OSINT CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: python3 core/suspect_matrix.py
      - run: python3 core/osint_cli.py --help
